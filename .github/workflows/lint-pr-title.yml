name: Lint PR Title

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

permissions:
  pull-requests: read

jobs:
  lint:
    name: Validate PR Title
    runs-on: ubuntu-latest
    steps:
      - name: Check PR title follows conventional commits
        uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Require conventional commit format
          types: |
            feat
            fix
            docs
            style
            refactor
            perf
            test
            build
            ci
            chore
            revert
          # Optional scopes
          scopes: |
            frontend
            backend
            api
            db
            auth
            ui
            deps
            docker
          # Require scope in parentheses
          requireScope: false
          # Subject pattern (lowercase, no period at end)
          subjectPattern: ^[a-z].+[^.]$
          subjectPatternError: |
            The subject "{subject}" doesn't match the required pattern.

            Please use lowercase and don't end with a period.
            Example: "feat: add user authentication"
          # Ignore dependabot PRs
          ignoreLabels: |
            dependencies
